function App(){
  const [route, setRoute] = useState({ name:'dashboard', params:{} });
  const [currentUserId, setCurrentUserId] = useState('u1');
  const [analisis, setAnalisis] = useState(ANALISIS);

  const navigate = (name, params={}) => setRoute({ name, params });
  const me = consultorById(currentUserId);

  return (
    <div className="flex min-h-screen">
      <Sidebar route={route} onNav={navigate} me={me} onSwitchUser={setCurrentUserId} />
      <main className="flex-1 ml-64">
        <Topbar me={me} onSwitchUser={setCurrentUserId} route={route} onNav={navigate} />
        <div className="px-8 py-6">
          {route.name==='dashboard' && <Dashboard analisis={analisis} me={me} onNav={navigate} />}
          {route.name==='mis-analisis' && <MisAnalisis analisis={analisis} me={me} onNav={navigate} />}
          {route.name==='nuevo' && <NewAnalysisForm me={me} onNav={navigate} onCreate={a=>setAnalisis([a, ...analisis])} />}
          {route.name==='progreso' && <ProgressView id={route.params.id} analisis={analisis} onNav={navigate} setAnalisis={setAnalisis} />}
          {route.name==='informe' && <ReportView id={route.params.id} analisis={analisis} onNav={navigate} />}
          {route.name==='clientes' && <ClientesView analisis={analisis} onNav={navigate} />}
          {route.name==='equipo' && <EquipoView analisis={analisis} />}
        </div>
      </main>
    </div>
  );
}

// ============================================================
//  SIDEBAR
// ============================================================
function Sidebar({ route, onNav, me }){
  const Item = ({ id, label, icon }) => {
    const active = route.name===id || (id==='nuevo' && route.name==='progreso') || (id==='dashboard' && route.name==='informe');
    return (
      <button onClick={()=>onNav(id)}
        className={`w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium rounded-lg transition ${active ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}`}>
        <span className="w-5 h-5">{icon}</span>
        <span>{label}</span>
      </button>
    );
  };

  return (
    <aside className="fixed top-0 left-0 w-64 h-screen border-r border-slate-200 bg-white px-4 py-5 flex flex-col">
      <div className="px-2 mb-7">
        <div className="flex items-center gap-2">
          <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-700 to-blue-500 flex items-center justify-center text-white font-bold">S</div>

            <p className="text-sm font-bold text-slate-900 leading-tight">SEO Lab Agency</p>
            <p className="text-[10px] text-slate-500 leading-tight">Plataforma de análisis</p>
          </div>
        </div>
      </div>

      <p className="px-4 mb-2 text-[10px] font-semibold uppercase tracking-wider text-slate-400">Análisis</p>
      <div className="space-y-1">
        <Item id="dashboard"      label="Tablero general" icon={ICON.dashboard} />
        <Item id="mis-analisis"   label="Mis análisis"    icon={ICON.user} />
        <Item id="nuevo"          label="Nuevo análisis"  icon={ICON.plus} />
      </div>

      <p className="px-4 mt-6 mb-2 text-[10px] font-semibold uppercase tracking-wider text-slate-400">Datos</p>
      <div className="space-y-1">
        <Item id="clientes" label="Clientes"  icon={ICON.briefcase} />
        <Item id="equipo"   label="Equipo"    icon={ICON.team} />
      </div>

      <div className="flex-1"></div>

      <div className="border-t border-slate-200 pt-4 px-2">
        <div className="flex items-center gap-3">
          <div className={`w-9 h-9 rounded-full ${me.color} text-white font-semibold flex items-center justify-center text-sm`}>{me.initials}</div>

            <p className="text-[11px] text-slate-500 truncate">{me.role}</p>

}

function Topbar({ me, onSwitchUser, route, onNav }){
  return (
    <div className="sticky top-0 z-10 border-b border-slate-200 bg-white/80 backdrop-blur px-8 py-3 flex items-center justify-between">
      <div className="flex items-center gap-2 text-sm">
        <span className="text-slate-500">SEO Lab Agency</span>
        <span className="text-slate-300">/</span>
        <span className="text-slate-700 font-medium">{routeBreadcrumb(route)}</span>
      </div>
      <div className="flex items-center gap-3">
        <span className="text-xs text-slate-500">Ver como</span>
        <select value={me.id} onChange={e=>onSwitchUser(e.target.value)}
          className="text-sm bg-slate-100 border border-slate-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-200">
          {CONSULTORES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <button onClick={()=>onNav('nuevo')} className="bg-blue-700 text-white text-sm font-medium px-4 py-1.5 rounded-md hover:bg-blue-800">+ Nuevo análisis</button>
      </div>
    </div>
  );
}

function routeBreadcrumb(r){
  if(r.name==='dashboard') return 'Tablero general';
  if(r.name==='mis-analisis') return 'Mis análisis';
  if(r.name==='nuevo') return 'Nuevo análisis';
  if(r.name==='progreso') return 'Análisis en curso';
  if(r.name==='informe') return 'Informe del cliente';
  if(r.name==='clientes') return 'Clientes';
  if(r.name==='equipo') return 'Equipo';
  return '';
}

// ============================================================
//  DASHBOARD — tablero general con TODOS los análisis
// ============================================================
function Dashboard({ analisis, me, onNav }){
  const [filtroConsultor, setFiltroConsultor] = useState('all');
  const [filtroStatus, setFiltroStatus]       = useState('all');
  const [search, setSearch]                   = useState('');

  const filtrados = useMemo(()=> analisis.filter(a=>{
    if(filtroConsultor!=='all' && a.consultor!==filtroConsultor) return false;
    if(filtroStatus!=='all'    && a.status!==filtroStatus)       return false;
    if(search && !(a.cliente.toLowerCase().includes(search.toLowerCase()) || a.dominio.includes(search.toLowerCase()))) return false;
    return true;
  }), [analisis, filtroConsultor, filtroStatus, search]);

  const stats = useMemo(()=>{
    const total = analisis.length;
    const completos = analisis.filter(a=>a.status==='complete').length;
    const enCurso = analisis.filter(a=>a.status==='running').length;
    const error = analisis.filter(a=>a.status==='error').length;
    const trafficSum = analisis.filter(a=>a.traffic).reduce((s,a)=>s+a.traffic,0);
    const valueSum = analisis.filter(a=>a.value).reduce((s,a)=>s+a.value,0);
    return { total, completos, enCurso, error, trafficSum, valueSum };
  }, [analisis]);

  return (
    <div>
      <div className="mb-7">
        <h1 className="text-2xl font-bold text-slate-900">Tablero general</h1>
        <p className="text-sm text-slate-600 mt-1">Todos los análisis SEO ejecutados por el equipo.</p>
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-7">
        <KpiCard label="Análisis totales" value={stats.total} tone="slate" hint={`${stats.completos} completados`} />
        <KpiCard label="En curso ahora" value={stats.enCurso} tone="blue" hint="Pipeline activo" />
        <KpiCard label="Tráfico orgánico monitoreado" value={formatCompact(stats.trafficSum)} tone="emerald" hint="visitas/mes acumuladas" />
        <KpiCard label="Valor de tráfico" value={`$${formatCompact(stats.valueSum)}`} tone="amber" hint="USD/mes equivalente Ads" />
      </div>

      {/* Filtros */}
      <div className="bg-white border border-slate-200 rounded-lg p-3 mb-3 flex flex-wrap items-center gap-2">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar cliente o dominio…"
          className="text-sm px-3 py-2 border border-slate-200 rounded-md flex-1 min-w-[200px] focus:outline-none focus:ring-2 focus:ring-blue-200" />
        <select value={filtroConsultor} onChange={e=>setFiltroConsultor(e.target.value)} className="text-sm px-3 py-2 border border-slate-200 rounded-md bg-white">
          <option value="all">Todos los consultores</option>
          {CONSULTORES.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} className="text-sm px-3 py-2 border border-slate-200 rounded-md bg-white">
          <option value="all">Todos los estados</option>
          <option value="complete">Completados</option>
          <option value="running">En curso</option>
          <option value="error">Con error</option>
        </select>
      </div>

      {/* Tabla */}
      <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 border-b border-slate-200">
            <tr className="text-left text-xs uppercase tracking-wider text-slate-500">
              <th className="px-4 py-3 font-semibold">Cliente</th>
              <th className="px-4 py-3 font-semibold">País</th>
              <th className="px-4 py-3 font-semibold">Consultor</th>
              <th className="px-4 py-3 font-semibold">Snapshot</th>
              <th className="px-4 py-3 font-semibold text-right">DR</th>
              <th className="px-4 py-3 font-semibold text-right">Tráfico/mes</th>
              <th className="px-4 py-3 font-semibold text-right">Valor</th>
              <th className="px-4 py-3 font-semibold">Estado</th>
              <th className="px-4 py-3 font-semibold text-right">Acción</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {filtrados.map(a=>{
              const c = consultorById(a.consultor);
              return (
                <tr key={a.id} className="hover:bg-slate-50">
                  <td className="px-4 py-3">
                    <p className="font-medium text-slate-900">{a.cliente}</p>
                    <p className="text-xs text-slate-500">{a.dominio}</p>
                  </td>
                  <td className="px-4 py-3 text-slate-600">{PAIS[a.pais]}</td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <div className={`w-7 h-7 rounded-full ${c.color} text-white text-xs font-semibold flex items-center justify-center`}>{c.initials}</div>
                      <div>
                        <p className="text-slate-800 leading-tight">{c.name}</p>
                        <p className="text-[10px] text-slate-500 leading-tight">{c.role}</p>
                      </div>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-slate-600">{a.snapshot}</td>
                  <td className="px-4 py-3 text-right font-semibold text-slate-800">{a.dr ?? '—'}</td>
                  <td className="px-4 py-3 text-right text-slate-700">{a.traffic ? formatNumber(a.traffic) : '—'}</td>
                  <td className="px-4 py-3 text-right text-emerald-700 font-medium">{a.value ? '$'+formatCompact(a.value) : '—'}</td>
                  <td className="px-4 py-3"><StatusBadge status={a.status}/></td>
                  <td className="px-4 py-3 text-right">

function ProgressView({ id, analisis, onNav, setAnalisis }){
  const a = analisis.find(x=>x.id===id);
  const [stages, setStages] = useState(()=>STAGES_TEMPLATE.map((s,i)=>({...s, state: i===0 ? 'done' : 'pending'})));
  const [overview, setOverview] = useState(null);
  const tickRef = useRef();

  useEffect(()=>{
    if(!a || a.status!=='running') return;
    const order = ['submitted','queued','dispatched','ingest_keywords','ingest_top_pages','ingest_backlinks','ingest_referring','site_overview','comparison','diagnostic','recovery','report'];
    let i = 1;
    const tick = ()=>{
      if(i>=order.length){
        // marcar completo
        setAnalisis(prev => prev.map(x => x.id===id ? { ...x, status:'complete', dr:67, traffic:325000, value:5800000, kws:42000, refdom:3100, findings:7, recovery:5 } : x));
        return;
      }
      const key = order[i];
      setStages(prev => prev.map(s => {
        if(s.key===key) return {...s, state:'running'};
        return s;
      }));
      setTimeout(()=>{
        setStages(prev => prev.map(s => s.key===key ? {...s, state:'done'} : s));
        if(key==='site_overview') setOverview({ dr:67, organic_traffic:325000, organic_keywords:42000, traffic_value:5800000 });
        i++;
        tickRef.current = setTimeout(tick, 600);
      }, 700);
    };
    tickRef.current = setTimeout(tick, 600);
    return ()=> clearTimeout(tickRef.current);
  }, [id]);

  if(!a) return <p className="text-slate-500">Análisis no encontrado.</p>;
  const c = consultorById(a.consultor);
  const done = stages.filter(s=>s.state==='done').length;
  const progress = Math.round((done/stages.length)*100);
  const isComplete = stages.every(s=>s.state==='done');

  return (
    <div className="max-w-3xl">
      <div className="mb-6">
        <p className="text-xs font-semibold uppercase tracking-wider text-blue-700">Análisis SEO en curso</p>
        <h1 className="mt-1 text-2xl font-bold text-slate-900 break-all">{a.dominio}</h1>
        <p className="text-sm text-slate-600 mt-1">{a.cliente} · Mercado: <strong className="uppercase">{a.pais}</strong> · Snapshot {a.snapshot}</p>
        <div className="flex items-center gap-2 mt-3">
          <div className={`w-6 h-6 rounded-full ${c.color} text-white text-[10px] font-semibold flex items-center justify-center`}>{c.initials}</div>
          <p className="text-xs text-slate-600">Ejecutado por <strong>{c.name}</strong></p>
        </div>
      </div>

      <div className="mb-7">
        <div className="flex justify-between text-xs text-slate-600 mb-1">
          <span>Progreso general</span>
          <span className="font-semibold">{progress}%</span>
        </div>
        <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
          <div className={`h-full transition-all duration-500 ${isComplete ? 'bg-emerald-500' : 'bg-blue-600'}`} style={{ width: progress+'%' }} />
        </div>
      </div>

      <section className="mb-7">
        <h2 className="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-3">Snapshot del dominio</h2>
        {!overview ? (
          <div className="rounded-lg border border-dashed border-slate-300 bg-slate-50 px-6 py-7 text-center text-sm text-slate-500">Las métricas aparecerán cuando el agente de valuación termine.</div>
        ) : (
          <div className="grid grid-cols-4 gap-3">
            <MetricCard value={formatNumber(overview.organic_traffic)} label="Tráfico orgánico mensual" tone="blue" />
            <MetricCard value={formatNumber(overview.organic_keywords)} label="Keywords orgánicas" tone="blue" />
            <MetricCard value={'$'+formatCompact(overview.traffic_value)} label="Valor de tráfico USD/mes" tone="emerald" />
            <MetricCard value={overview.dr+'/100'} label="Domain Rating" tone="slate" />
          </div>
        )}
      </section>

      <section className="bg-white border border-slate-200 rounded-lg">
        <ol className="divide-y divide-slate-100 px-5">
          {stages.map(s => <StageRow key={s.key} stage={s} />)}
        </ol>
      </section>

      <div className="mt-9 flex items-center justify-between border-t border-slate-200 pt-5">
        <button onClick={()=>onNav('nuevo')} className="text-sm font-medium text-slate-600 hover:underline">← Nuevo análisis</button>
        {isComplete ? (
          <button onClick={()=>onNav('informe',{id})} className="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold px-5 py-2.5 rounded-md">Ver informe completo →</button>
        ) : (
          <span className="text-xs text-slate-500">El informe estará disponible al terminar las 12 etapas.</span>
        )}
      </div>
    </div>
  );
}

function StageRow({ stage }){
  const { state, label } = stage;
  return (
    <li className="flex items-center gap-3 py-3">

  );
}

function KpiCard({ label, value, tone, hint }){
  const tones = {
    slate: 'border-slate-200 bg-white',
    blue:  'border-blue-100 bg-blue-50',
    emerald:'border-emerald-100 bg-emerald-50',
    amber: 'border-amber-100 bg-amber-50',
  };
  const valColor = { slate:'text-slate-900', blue:'text-blue-800', emerald:'text-emerald-700', amber:'text-amber-700' };
  return (
    <div className={`rounded-lg border ${tones[tone]} px-5 py-4`}>
      <p className="text-xs font-medium text-slate-600">{label}</p>
      <p className={`mt-1 text-2xl font-bold ${valColor[tone]}`}>{value}</p>
      {hint && <p className="mt-1 text-[11px] text-slate-500">{hint}</p>}
    </div>
  );
}

function MetricCard({ value, label, tone }){
  const tones = {
    blue:'border-blue-100 bg-blue-50 text-blue-800',
    emerald:'border-emerald-100 bg-emerald-50 text-emerald-700',
    slate:'border-slate-200 bg-slate-50 text-slate-800',
  };
  return (
    <div className={`rounded-lg border ${tones[tone]} px-4 py-3`}>
      <p className="text-xl font-bold">{value}</p>
      <p className="mt-1 text-[11px] font-medium opacity-80">{label}</p>
    </div>
  );
}

function StatusBadge({ status }){
  if(status==='complete') return <span className="inline-flex items-center gap-1 bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-full text-xs font-medium">✓ Completado</span>;
  if(status==='running')  return <span className="inline-flex items-center gap-1 bg-blue-100 text-blue-800 px-2 py-0.5 rounded-full text-xs font-medium"><Spin small/> En curso</span>;
  if(status==='error')    return <span className="inline-flex items-center gap-1 bg-red-100 text-red-800 px-2 py-0.5 rounded-full text-xs font-medium">✕ Error</span>;
  return null;
}

const formatNumber = (n) => new Intl.NumberFormat('es-ES').format(n);
const formatCompact = (n) => {
  if(n==null) return '—';
  if(n>=1_000_000_000) return (n/1_000_000_000).toFixed(2)+'B';
  if(n>=1_000_000) return (n/1_000_000).toFixed(2)+'M';
  if(n>=1_000) return (n/1_000).toFixed(1)+'K';
  return ''+n;
};

// Markdown muy básico
function renderMarkdown(md){
  // tablas
  let html = md.replace(/^\| (.+) \|\n\|([- :|]+)\|\n((?:\|.*\|\n?)+)/gm, (m, head, sep, body) => {
    const headCells = head.split('|').map(s=>`<th>${s.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(r => '<tr>' + r.replace(/^\||\|$/g,'').split('|').map(s=>`<td>${inline(s.trim())}</td>`).join('') + '</tr>').join('');
    return `<table><thead><tr>${headCells}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  html = html
    .replace(/^### (.*)$/gm, '<h3>$1</h3>')
    .replace(/^## (.*)$/gm,  '<h2>$1</h2>')
    .replace(/^# (.*)$/gm,   '<h1>$1</h1>')
    .replace(/^> (.*)$/gm,   '<blockquote>$1</blockquote>')
    .replace(/^- (.+)$/gm,   '<li>$1</li>');
  html = html.replace(/(<li>.+<\/li>\n?)+/g, m => '<ul>'+m+'</ul>');
  // párrafos
  html = html.split(/\n\n+/).map(b => {
    if(/^<(h\d|ul|ol|table|blockquote)/.test(b.trim())) return b;
    return '<p>'+inline(b)+'</p>';
  }).join('\n');
  return html;
}
function inline(s){
  return s
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}
